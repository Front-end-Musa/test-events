<div class="modal-backdrop" (click)="close()"></div>
<div class="modal" role="dialog" aria-modal="true">
  <div class="modal-header">
    <h2>{{ mode === 'edit' ? 'Edit Event' : 'Create Event' }}</h2>
    <button type="button" class="close-btn" (click)="close()">✕</button>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="modal-body">
    <label>
      Title
      <input formControlName="title" placeholder="Event title" />
      <small *ngIf="form.get('title')?.invalid && form.get('title')?.touched" class="error">
        Title is required (min 3 characters)
      </small>
    </label>

    <label>
      Description
      <textarea formControlName="description" placeholder="Event description"></textarea>
    </label>

    <label>
      Date & Time
      <input formControlName="date" type="datetime-local" />
      <small *ngIf="form.get('date')?.invalid && form.get('date')?.touched" class="error">
        Date is required
      </small>
    </label>

    <label>
      Category
      <select formControlName="category">
        <option *ngFor="let category of categories" [value]="category">{{ category }}</option>
      </select>
    </label>

    <label>
      Status
      <select formControlName="status">
        <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
      </select>
    </label>

    <label class="checkbox-ctrl">
      <input type="checkbox" formControlName="favorite" />
      Favorite
    </label>

    <div class="button-row">
      <button type="button" class="secondary" (click)="close()">Cancel</button>
      <button type="submit" [disabled]="form.invalid">
        {{ mode === 'edit' ? 'Update' : 'Create' }}
      </button>
    </div>
  </form>
</div>
